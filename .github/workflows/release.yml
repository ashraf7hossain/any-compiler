name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build binary (${{ matrix.target.os }}-${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            exe: ""
          - runner: macos-13
            os: darwin
            arch: amd64
            exe: ""
          - runner: macos-14
            os: darwin
            arch: arm64
            exe: ""
          - runner: windows-latest
            os: windows
            arch: amd64
            exe: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install g++ (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install mingw -y
          Add-Content -Path $env:GITHUB_PATH -Value "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"

      - name: Build any-compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          g++ -O2 -std=c++11 -Wall -Wextra -DAPP_VERSION=\"$VERSION\" src/main.cpp -o "any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}"

      - name: Build any-compiler (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          & g++ -O2 -std=c++11 -Wall -Wextra "-DAPP_VERSION=`"$version`"" src/main.cpp -o "any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.exe }}"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Create SHA256 checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          sha256sum "any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}" > "any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}.sha256"

      - name: Create SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $binary = "any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.exe }}"
          $hash = (Get-FileHash -Algorithm SHA256 $binary).Hash.ToLower()
          "$hash  any-compiler" | Out-File -FilePath "$binary.sha256" -Encoding ascii -NoNewline

      - name: Upload binary assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.exe }}
            any-compiler-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.exe }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    name: Build deb package
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Build linux amd64 binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          g++ -O2 -std=c++11 -Wall -Wextra -DAPP_VERSION=\"$VERSION\" src/main.cpp -o any-compiler

      - name: Build deb package
        run: |
          mkdir -p /tmp/any-compiler-deb/usr/local/bin
          cp any-compiler /tmp/any-compiler-deb/usr/local/bin/
          chmod +x /tmp/any-compiler-deb/usr/local/bin/any-compiler

          mkdir -p /tmp/any-compiler-deb/DEBIAN
          cat > /tmp/any-compiler-deb/DEBIAN/control << EOF
          Package: any-compiler
          Version: ${GITHUB_REF_NAME#v}
          Architecture: amd64
          Maintainer: Ashraf Hossain
          Description: Compile code in any language via OneCompiler API
           any-compiler is a command-line tool for compiling and executing code
           in multiple programming languages using the OneCompiler API.
          EOF

          dpkg-deb --build /tmp/any-compiler-deb any-compiler_${GITHUB_REF_NAME#v}_amd64.deb

      - name: Upload deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: any-compiler_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
